name: Coding-Style Frontend Web

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  Coding-Style:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install   # instead of npm ci

      - name: Run ESLint
        run: |
          npx eslint ./src ./vite.config.js ./eslint.config.js \
            --ext .js,.jsx,.ts,.tsx \
            --max-warnings=0